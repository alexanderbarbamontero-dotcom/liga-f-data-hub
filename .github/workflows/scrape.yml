name: Scrape Liga F Data
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Descarga todo el historial para evitar errores de subida
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install pandas requests beautifulsoup4 lxml
      - run: python scraper.py
      - name: Force Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f liga_f_players.csv liga_f_league.csv # Forzamos la adición de los archivos
          git commit -m "📊 Update Liga F data: $(date)" || echo "No changes to commit"
          git push origin main
